<div class="app-modal-content space-y-4 p-4">
    <div class="flex items-center justify-between">
        <h3 class="app-title-sm">Nova transacao</h3>
        <button type="button" onclick="window.financeApp.closeModal()" class="app-mini-btn" aria-label="Fechar modal">
            Fechar
        </button>
    </div>

    <form
        id="quick-transaction-form"
        hx-post="{% url 'transactions:quick-add' %}"
        hx-target="#modal-content"
        hx-swap="innerHTML"
        class="space-y-3"
    >
        {% include "partials/form_fields.html" %}
        <button type="submit" class="app-btn-primary w-full">Salvar transacao</button>
    </form>
</div>

<script>
    (function () {
        const form = document.getElementById("quick-transaction-form");
        if (!form) {
            return;
        }

        const recurrenceField = form.querySelector('[name="recurrence_type"]');
        const installmentField = form.querySelector('[name="installment_count"]');
        const intervalField = form.querySelector('[name="recurrence_interval"]');

        if (!recurrenceField) {
            return;
        }

        const installmentWrapper = installmentField ? installmentField.closest("div.space-y-1") : null;
        const intervalWrapper = intervalField ? intervalField.closest("div.space-y-1") : null;

        const toggleFields = function () {
            const isInstallment = recurrenceField.value === "installment";
            const showInterval = recurrenceField.value !== "fixed";

            if (installmentWrapper) {
                installmentWrapper.classList.toggle("hidden", !isInstallment);
                if (!isInstallment && installmentField) {
                    installmentField.value = "";
                }
            }

            if (intervalWrapper) {
                intervalWrapper.classList.toggle("hidden", !showInterval);
            }
        };

        recurrenceField.addEventListener("change", toggleFields);
        toggleFields();
    })();
</script>
